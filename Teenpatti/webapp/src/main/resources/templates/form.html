<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<link th:href="main.css" rel="stylesheet" />
<body>
<div class="login-box">
    <h2>Login</h2>
    <form action="#" th:action="@{/}" th:object="${login}" method="post">
        <div class="user-box">
            <input type="text" th:field="*{userName}" name="" required="">
            <label >Username</label>
        </div>
        <div class="user-box">
            <input type="password" th:field="*{passWord}" name="" required="">
            <label >Password</label>
        </div>
        <a href="#">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            
            <button type="submit" >Submit</button>
        </a>
    </form>
</div>
</body>
</html>
